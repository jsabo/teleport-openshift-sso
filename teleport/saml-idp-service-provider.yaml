# Template — rendered by scripts/render.sh (KC_ROUTE_HOST from demo.env).
#
# Registers Keycloak as a service provider with Teleport's SAML identity
# provider (Enterprise feature). Apply with the tctl profile pointed at the
# Teleport cluster:  tctl create -f rendered/teleport/saml-idp-service-provider.yaml
#
# Teleport always asserts:
#   uid                  (urn:oid:0.9.2342.19200300.100.1.1)  = Teleport username
#   eduPersonAffiliation (urn:oid:1.3.6.1.4.1.5923.1.1.1.1)   = Teleport role names
# The attribute_mapping below additionally asserts the user's email. It
# assumes Teleport usernames are email addresses (the common SSO setup) —
# if yours aren't, point it at a trait instead, e.g. user.spec.traits.email.
# The labels matter: Teleport authorizes access to SAML service providers via
# app_labels in VERSION 8 roles (v7 roles' app_labels don't count here).
# This applies both to managing the resource AND to users logging in through
# it — every user who should reach OpenShift needs a v8 role whose app_labels
# match these labels. Creating an UNLABELED provider requires a v8 role with
# wildcard app_labels.
kind: saml_idp_service_provider
version: v1
metadata:
  name: openshift-console
  labels:
    purpose: openshift-console-sso
spec:
  entity_id: https://${KC_ROUTE_HOST}/realms/teleport
  acs_url: https://${KC_ROUTE_HOST}/realms/teleport/broker/teleport/endpoint
  # Where Teleport's application tile sends the user. Without this the tile
  # performs IdP-initiated SAML, which Keycloak's broker rejects (and which
  # couldn't start OpenShift's OIDC flow anyway) — logins must start at the
  # console. With it, the tile is a working entry point: console → OAuth →
  # Keycloak → straight through the user's existing Teleport session.
  launch_urls:
    - https://${CONSOLE_HOST}/
  attribute_mapping:
    - name: urn:oid:0.9.2342.19200300.100.1.3 # mail
      value: user.metadata.name
