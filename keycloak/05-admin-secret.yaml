# Template — rendered by scripts/render.sh (KC_ADMIN_PASSWORD from demo.env).
# This is the bootstrap password for Keycloak's local `admin` account, used to
# reach the Keycloak admin console at https://<KC_ROUTE_HOST>/admin/.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: keycloak
type: Opaque
stringData:
  password: "${KC_ADMIN_PASSWORD}"
